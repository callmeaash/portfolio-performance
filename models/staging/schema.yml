version: 2

models:
  - name: stg_ohlc
    description: >
      Cleaned daily OHLC candlestick data with pre-computed technical indicators.
      Adds derived fields like daily range and indicator interpretation zones.
    
    columns:
      - name: date
        description: Trading date
        tests: [not_null]
      - name: symbol
        description: Uppercased stock ticker symbol
        tests: [not_null]
      - name: close
        description: Closing price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: rsi_14
        description: 14-period RSI value (0–100)
      - name: macd
        description: MACD line
      - name: macd_signal
        description: MACD signal line (9-period EMA of MACD)
      - name: macd_trend
        description: BULLISH when MACD > signal, else BEARISH
        tests:
          - accepted_values:
              values: ["BULLISH", "BEARISH"]
      - name: rsi_zone
        description: RSI interpretation zone
        tests:
          - accepted_values:
              values: ["OVERSOLD", "UNDERSOLD", "NEUTRAL"]
  
  - name: stg_trades
    description: >
      Cleaned trade records. Filters out the records with invalid dates or prices.
    columns:
      - name: symbol
        description: Stock ticker symbol
        tests: [not_null]
      - name: entry_date
        description: Date the trade was entered
        tests: [not_null]
      - name: exit_date
        description: Date the trade was exited
        tests: [not_null]
      - name: type
        description: Trade direction — BUY or SELL
        tests:
          - not_null
          - accepted_values:
              values: ["BUY", "SELL"]
      - name: entry_price
        description: Closing price at entry
        tests: [not_null]
      - name: exit_price
        description: Closing price at exit
        tests: [not_null]
      - name: pnl
        description: Absolute profit or loss
        tests: [not_null]
      - name: pnl_pct
        description: Percentage PnL relative to entry price
        tests: [not_null]
      - name: result
        description: Trade result
        tests:
          - accepted_values:
              values: ["WIN", "LOSS"]
      