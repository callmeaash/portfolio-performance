version: 2

sources:
  - name: raw
    description: >
      Raw data loaded via `dbt seed`. Contains ohlc data and trades data
      generated from ohlc data.
    schema: main_raw

    tables:
      - name: ohlc
        description: > 
          Daily OHLC price data with pre-computed technical indicators.
        columns:
          - name: date
            description: Trading date
            tests: [not_null]
          - name: symbol
            description: Stock ticker symbol
            tests: [not_null]
          - name: open
            description: Opening price
          - name: high
            description: Intraday high
          - name: low
            description: Intraday low
          - name: close
            description: Closing price
            tests: [not_null]
          - name: volume
            description: Total shares traded
          - name: amount
            description: Total traded value in NPR
          - name: per_change
            description: Percentage change from previous close
          - name: MACD
            description: MACD line value
          - name: MACD_signal
            description: MACD signal line (EMA of MACD)
          - name: RSI_14
            description: 14-period Relative Strength Index
        
      - name: trades
        description: >
          Trade records generated from ohlc data.
          Each row represents one completed trade (entry → exit) per symbol.
        columns:
          - name: symbol
            description: Stock ticker symbol (e.g. AHL, MEHL)
            tests: [not_null]
          - name: entry_date
            description: Date the trade was entered
            tests: [not_null]
          - name: exit_date
            description: Date the trade was exited
            tests: [not_null]
          - name: type
            description: Trade direction — BUY or SELL
            tests:
              - not_null
              - accepted_values:
                  values: ["BUY", "SELL"]
          - name: entry_price
            description: Closing price at entry
            tests: [not_null]
          - name: exit_price
            description: Closing price at exit
          - name: pnl
            description: Absolute profit or loss (exit_price - entry_price for BUY)
            tests: [not_null]
          - name: pnl_pct
            description: Percentage PnL relative to entry price
            tests: [not_null]
          - name: result
            description: WIN or LOSS outcome
            tests:
              - not_null
              - accepted_values:
                  values: ["WIN", "LOSS"]

